name: searchlight
description: A full-text search engine for Dart with BM25 scoring, filters, facets, geosearch, and highlighting.
version: 0.1.0
repository: https://github.com/kingdomseed/searchlight

environment:
  sdk: ^3.3.0

dependencies:
  cbor: ^6.5.1
  geobase: ^1.5.0
  r_tree: ^3.0.2
  snowball_stemmer: ^0.1.0
  unorm_dart: ^0.3.2

dev_dependencies:
  test: ^1.25.0
  very_good_analysis: ^10.0.0
