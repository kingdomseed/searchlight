name: searchlight
description: Pure Dart reimplementation of Orama-style in-memory search and indexing for Dart and Flutter.
version: 0.1.0
homepage: https://github.com/kingdomseed/searchlight/tree/main/packages/searchlight
repository: https://github.com/kingdomseed/searchlight
issue_tracker: https://github.com/kingdomseed/searchlight/issues
documentation: https://github.com/kingdomseed/searchlight/tree/main/packages/searchlight
topics:
  - search
  - full-text-search
  - indexing
  - flutter

environment:
  sdk: ^3.3.0

dependencies:
  cbor: ^6.5.1
  geobase: ^1.5.0
  meta: ^1.12.0
  r_tree: ^3.0.2
  snowball_stemmer: ^0.1.0
  unorm_dart: ^0.3.2

dev_dependencies:
  test: ^1.25.0
  very_good_analysis: ^10.0.0
